    <header class="topbar" aria-label="Menu principal">
      <a class="brand" href="#inicio" aria-label="SoluEscolaIA - início">
        <span class="brand-logo" aria-hidden="true"></span>
        <span class="brand-name">SoluEscola<span>IA</span></span>
      </a>
      <nav class="nav-links" aria-label="Categorias">
        <a href="#inicio">Início</a>
        <a href="#sistemas">Sistemas</a>
        <a href="#destaques">Destaques</a>
      </nav>
      <label class="search" for="searchInput">
        <svg class="icon" aria-hidden="true">
          <use href="#icon-search"></use>
        </svg>
        <input id="searchInput" type="search" placeholder="Buscar sistema" autocomplete="off" />
        <kbd aria-hidden="true">/</kbd>
      </label>
    </header>

    <main id="app"></main>

    <template id="homeTemplate">
      <section class="hero" aria-labelledby="heroTitle">
        <div class="hero-pattern" aria-hidden="true"></div>
        <div class="hero-content">
          <p class="eyebrow">Sistemas desenvolvidos com Canva IA</p>
          <h1 id="heroTitle">HUB de soluções <span>escolares com IA</span></h1>
          <p class="hero-text">
            Inovação, gestão e transformação para a escola do futuro.
          </p>
          <div class="ia-line">
            <span class="ia-badge" aria-hidden="true">IA</span>
            <span>Inteligência Artificial a serviço da educação.</span>
          </div>
          <div class="hero-actions">
            <a class="primary-button" href="#sistemas">
              Ver sistemas
              <svg class="icon" aria-hidden="true"><use href="#icon-arrow-right"></use></svg>
            </a>
            <a class="ghost-button" href="#destaques">
              Acessos rápidos
              <svg class="icon" aria-hidden="true"><use href="#icon-bolt"></use></svg>
            </a>
          </div>
        </div>
        <div class="hero-showcase" aria-hidden="true">
          <svg class="school-scene" viewBox="0 0 480 400" fill="none" xmlns="http://www.w3.org/2000/svg">
            <ellipse class="orbit" cx="240" cy="205" rx="188" ry="150" />
            <g class="net">
              <line x1="109" y1="110" x2="228" y2="150" />
              <line x1="371" y1="110" x2="252" y2="150" />
              <line x1="109" y1="300" x2="150" y2="286" />
              <line x1="371" y1="300" x2="330" y2="286" />
            </g>
            <g class="school">
              <line x1="96" y1="300" x2="384" y2="300" />
              <path d="M120 300 V235 H170" />
              <rect x="132" y="250" width="20" height="24" rx="2" />
              <path d="M360 300 V235 H310" />
              <rect x="328" y="250" width="20" height="24" rx="2" />
              <path d="M170 300 V190 H310 V300" />
              <path d="M156 190 L240 120 L324 190 Z" />
              <path d="M240 120 V92" />
              <path d="M240 95 H262 L256 101.5 L262 108 H240" />
              <circle cx="240" cy="162" r="13" />
              <path d="M240 162 V154 M240 162 L245 165" />
              <path d="M226 300 V256 a14 14 0 0 1 28 0 V300" />
              <rect x="184" y="214" width="22" height="26" rx="2" />
              <rect x="274" y="214" width="22" height="26" rx="2" />
            </g>
            <g class="node node-1">
              <circle cx="109" cy="110" r="27" />
              <use href="#icon-brain" x="96" y="97" width="26" height="26" />
            </g>
            <g class="node node-2">
              <circle cx="371" cy="110" r="27" />
              <use href="#icon-chart" x="358" y="97" width="26" height="26" />
            </g>
            <g class="node node-3">
              <circle cx="109" cy="300" r="27" />
              <use href="#icon-inclusion" x="96" y="287" width="26" height="26" />
            </g>
            <g class="node node-4">
              <circle cx="371" cy="300" r="27" />
              <use href="#icon-file" x="358" y="287" width="26" height="26" />
            </g>
          </svg>
        </div>
      </section>

      <section class="feature-strip" aria-label="Diferenciais do HUB">
        <div class="feature">
          <span class="feature-icon fi-blue">
            <svg class="icon" aria-hidden="true"><use href="#icon-sparkles"></use></svg>
          </span>
          <div class="feature-text">
            <h3>Soluções inteligentes</h3>
            <p>Sistemas desenvolvidos com IA para otimizar processos escolares.</p>
          </div>
        </div>
        <div class="feature">
          <span class="feature-icon fi-green">
            <svg class="icon" aria-hidden="true"><use href="#icon-shield"></use></svg>
          </span>
          <div class="feature-text">
            <h3>Gestão eficiente</h3>
            <p>Ferramentas que facilitam a gestão e melhoram a tomada de decisões.</p>
          </div>
        </div>
        <div class="feature">
          <span class="feature-icon fi-purple">
            <svg class="icon" aria-hidden="true"><use href="#icon-inclusion"></use></svg>
          </span>
          <div class="feature-text">
            <h3>Colaboração</h3>
            <p>Integração entre professores, gestores e equipes para melhores resultados.</p>
          </div>
        </div>
        <div class="feature">
          <span class="feature-icon fi-amber">
            <svg class="icon" aria-hidden="true"><use href="#icon-rocket"></use></svg>
          </span>
          <div class="feature-text">
            <h3>Futuro da educação</h3>
            <p>Tecnologia e inovação para preparar sua escola para os próximos desafios.</p>
          </div>
        </div>
      </section>

      <section class="catalog" id="sistemas" aria-label="Lista de sistemas">
        <div class="section-head">
          <span class="section-icon" aria-hidden="true">
            <svg class="icon"><use href="#icon-chart"></use></svg>
          </span>
          <h2>Nossos sistemas</h2>
          <p id="resultCount"></p>
        </div>
        <div class="rail" id="projectRail"></div>
      </section>

      <section class="catalog compact" id="destaques" aria-label="Acessos rápidos dos sistemas">
        <div class="section-head">
          <h2>Acessos rápidos</h2>
          <p>Responsáveis, áreas e links externos</p>
        </div>
        <div class="quick-grid" id="highlightGrid"></div>
      </section>
    </template>

    <template id="detailTemplate">
      <article class="detail-page">
        <section class="detail-hero">
          <div class="detail-backdrop" id="detailBackdrop"></div>
          <div class="detail-content">
            <a class="back-link" href="#inicio">
              <svg class="icon" aria-hidden="true">
                <use href="#icon-arrow-left"></use>
              </svg>
              Voltar
            </a>
            <p class="eyebrow" id="detailCategory"></p>
            <h1 id="detailTitle"></h1>
            <p class="detail-description" id="detailDescription"></p>
            <div class="detail-actions" id="detailActions"></div>
          </div>
        </section>

        <section class="detail-body">
          <div class="info-panel">
            <h2>Sobre o sistema</h2>
            <p id="detailAbout"></p>
          </div>

          <div class="info-panel">
            <h2>Informações de acesso</h2>
            <div class="fact-grid" id="detailFacts"></div>
          </div>

          <div class="info-panel">
            <h2>Cenários de uso</h2>
            <div class="gallery" id="detailGallery"></div>
          </div>

          <div class="info-panel">
            <h2>Pontos principais</h2>
            <div class="highlight-list" id="detailHighlights"></div>
          </div>

          <div class="info-panel prompt-panel" id="detailPromptPanel">
            <h2>Prompts e respostas</h2>
            <p>Histórico de criação e evolução registrado pela equipe do sistema.</p>
            <div class="prompt-list" id="detailPrompts"></div>
          </div>
        </section>
      </article>
    </template>

    <script src="script.js"></script>
  </body>
</html>
